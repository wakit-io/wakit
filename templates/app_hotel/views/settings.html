<!-- 숙박 설정 페이지 -->
<link rel="stylesheet" href="css/hotel-settings.css">
<link rel="stylesheet" href="css/hotel-mypage.css">

<div class="hotel-mypage__header" style="position:sticky;top:0;z-index:10;">
  <button class="hotel-mypage__icon-btn" aria-label="뒤로가기"
    onclick="history.back()" style="margin-left:-8px;">
    <i class="bi bi-chevron-left"></i>
  </button>
  <h1 class="hotel-mypage__header-title" style="flex:1;text-align:center;">설정</h1>
  <div style="width:40px;"></div>
</div>

<main class="hotel-settings" role="main">

  <!-- 화면 테마 -->
  <div class="settings-group">
    <p class="settings-group__title">화면 테마</p>
    <div class="settings-theme-section">
      <div class="settings-theme-options" role="radiogroup" aria-label="테마 선택">

        <button type="button"
          class="settings-theme-option settings-theme-option--light"
          data-theme-option="light"
          role="radio"
          aria-checked="false">
          <div class="settings-theme-option__check"><i class="bi bi-check"></i></div>
          <div class="settings-theme-option__preview">☀️</div>
          <span class="settings-theme-option__label">라이트</span>
        </button>

        <button type="button"
          class="settings-theme-option settings-theme-option--dark"
          data-theme-option="dark"
          role="radio"
          aria-checked="false">
          <div class="settings-theme-option__check"><i class="bi bi-check"></i></div>
          <div class="settings-theme-option__preview">🌙</div>
          <span class="settings-theme-option__label">다크</span>
        </button>

        <button type="button"
          class="settings-theme-option settings-theme-option--system"
          data-theme-option="system"
          role="radio"
          aria-checked="false">
          <div class="settings-theme-option__check"><i class="bi bi-check"></i></div>
          <div class="settings-theme-option__preview">⚙️</div>
          <span class="settings-theme-option__label">시스템</span>
        </button>

      </div>
    </div>
  </div>

  <!-- 알림 설정 -->
  <div class="settings-group">
    <p class="settings-group__title">알림</p>
    <div class="settings-item">
      <div class="settings-item__left">
        <div class="settings-item__icon"><i class="bi bi-bell"></i></div>
        <span class="settings-item__label">푸시 알림</span>
      </div>
      <label class="settings-toggle" aria-label="푸시 알림 토글">
        <input type="checkbox" id="push-toggle" checked>
        <span class="settings-toggle__track"></span>
      </label>
    </div>
    <div class="settings-item">
      <div class="settings-item__left">
        <div class="settings-item__icon"><i class="bi bi-tag"></i></div>
        <span class="settings-item__label">할인/쿠폰 알림</span>
      </div>
      <label class="settings-toggle" aria-label="할인 알림 토글">
        <input type="checkbox" id="discount-toggle" checked>
        <span class="settings-toggle__track"></span>
      </label>
    </div>
    <div class="settings-item">
      <div class="settings-item__left">
        <div class="settings-item__icon"><i class="bi bi-calendar-event"></i></div>
        <span class="settings-item__label">예약 알림</span>
      </div>
      <label class="settings-toggle" aria-label="예약 알림 토글">
        <input type="checkbox" id="reservation-toggle" checked>
        <span class="settings-toggle__track"></span>
      </label>
    </div>
  </div>

  <!-- 앱 설정 -->
  <div class="settings-group">
    <p class="settings-group__title">앱 설정</p>
    <div class="settings-item">
      <div class="settings-item__left">
        <div class="settings-item__icon"><i class="bi bi-translate"></i></div>
        <span class="settings-item__label">언어</span>
      </div>
      <span class="settings-item__value">한국어</span>
    </div>
    <div class="settings-item">
      <div class="settings-item__left">
        <div class="settings-item__icon"><i class="bi bi-currency-exchange"></i></div>
        <span class="settings-item__label">통화</span>
      </div>
      <span class="settings-item__value">KRW (₩)</span>
    </div>
    <div class="settings-item">
      <div class="settings-item__left">
        <div class="settings-item__icon"><i class="bi bi-trash3"></i></div>
        <span class="settings-item__label">캐시 삭제</span>
      </div>
      <span class="settings-item__value">23.4 MB</span>
    </div>
  </div>

  <!-- 계정 -->
  <div class="settings-group">
    <p class="settings-group__title">계정</p>
    <a href="#" class="settings-item" style="text-decoration:none; color:inherit; display:flex;">
      <div class="settings-item__left">
        <div class="settings-item__icon"><i class="bi bi-box-arrow-right"></i></div>
        <span class="settings-item__label">로그아웃</span>
      </div>
    </a>
    <a href="#" class="settings-item" style="text-decoration:none; color:inherit; display:flex;">
      <div class="settings-item__left">
        <div class="settings-item__icon" style="color:#ef4444;"><i class="bi bi-person-x"></i></div>
        <span class="settings-item__label" style="color:#ef4444;">회원탈퇴</span>
      </div>
    </a>
  </div>

</main>

<!-- 페이지 진입 시 현재 테마 선택 상태를 UI에 반영 -->
<script>
  document.dispatchEvent(new CustomEvent('hotel:syncThemeUI'));
</script>
