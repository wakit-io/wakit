<!-- 숙박 더보기(마이페이지) | Figma: 숙박-더보기 (7326:42197) -->
<link rel="stylesheet" href="css/hotel-mypage.css">

<main class="hotel-mypage" role="main">

  <!-- 페이지 헤더 -->
  <div class="hotel-mypage__header">
    <h1 class="hotel-mypage__header-title">더보기</h1>
    <div class="hotel-mypage__header-actions">
      <button class="hotel-mypage__icon-btn" aria-label="설정"
        onclick="location.hash='#settings'">
        <i class="bi bi-gear"></i>
      </button>
    </div>
  </div>

  <!-- 프로필 카드 -->
  <div class="hotel-profile-card">
    <div class="hotel-profile-card__avatar">
      <i class="bi bi-person-fill"></i>
    </div>
    <div class="hotel-profile-card__info">
      <p class="hotel-profile-card__name">로그인 / 회원가입</p>
      <p class="hotel-profile-card__sub">로그인하고 다양한 혜택을 누려보세요</p>
    </div>
    <i class="bi bi-chevron-right hotel-profile-card__arrow"></i>
  </div>

  <!-- 퀵메뉴 -->
  <div class="hotel-quick-menu">
    <div class="hotel-quick-menu__grid">
      <a href="#" class="hotel-quick-menu__item">
        <div class="hotel-quick-menu__icon">
          <i class="bi bi-calendar-check"></i>
        </div>
        <span class="hotel-quick-menu__label">예약내역</span>
        <span class="hotel-quick-menu__count">0건</span>
      </a>
      <a href="#" class="hotel-quick-menu__item">
        <div class="hotel-quick-menu__icon">
          <i class="bi bi-ticket-perforated"></i>
        </div>
        <span class="hotel-quick-menu__label">쿠폰함</span>
        <span class="hotel-quick-menu__count">0장</span>
      </a>
      <a href="#" class="hotel-quick-menu__item">
        <div class="hotel-quick-menu__icon">
          <i class="bi bi-heart"></i>
        </div>
        <span class="hotel-quick-menu__label">찜목록</span>
        <span class="hotel-quick-menu__count">0개</span>
      </a>
    </div>
  </div>

  <!-- 혜택 메뉴 -->
  <div class="hotel-menu-group">
    <p class="hotel-menu-group__title">혜택</p>
    <a href="#" class="hotel-menu-item">
      <div class="hotel-menu-item__left">
        <div class="hotel-menu-item__icon"><i class="bi bi-gift"></i></div>
        <span class="hotel-menu-item__label">할인 쿠폰</span>
      </div>
      <div class="hotel-menu-item__right">
        <span class="hotel-menu-item__badge">NEW</span>
        <i class="bi bi-chevron-right hotel-menu-item__arrow"></i>
      </div>
    </a>
    <a href="#" class="hotel-menu-item">
      <div class="hotel-menu-item__left">
        <div class="hotel-menu-item__icon"><i class="bi bi-coin"></i></div>
        <span class="hotel-menu-item__label">포인트</span>
      </div>
      <div class="hotel-menu-item__right">
        <span class="hotel-menu-item__value">0P</span>
        <i class="bi bi-chevron-right hotel-menu-item__arrow"></i>
      </div>
    </a>
    <a href="#" class="hotel-menu-item">
      <div class="hotel-menu-item__left">
        <div class="hotel-menu-item__icon"><i class="bi bi-star"></i></div>
        <span class="hotel-menu-item__label">리뷰 관리</span>
      </div>
      <div class="hotel-menu-item__right">
        <i class="bi bi-chevron-right hotel-menu-item__arrow"></i>
      </div>
    </a>
  </div>

  <!-- 고객 서비스 -->
  <div class="hotel-menu-group">
    <p class="hotel-menu-group__title">고객 서비스</p>
    <a href="#" class="hotel-menu-item">
      <div class="hotel-menu-item__left">
        <div class="hotel-menu-item__icon"><i class="bi bi-megaphone"></i></div>
        <span class="hotel-menu-item__label">공지사항</span>
      </div>
      <div class="hotel-menu-item__right">
        <i class="bi bi-chevron-right hotel-menu-item__arrow"></i>
      </div>
    </a>
    <a href="#" class="hotel-menu-item">
      <div class="hotel-menu-item__left">
        <div class="hotel-menu-item__icon"><i class="bi bi-question-circle"></i></div>
        <span class="hotel-menu-item__label">자주 묻는 질문</span>
      </div>
      <div class="hotel-menu-item__right">
        <i class="bi bi-chevron-right hotel-menu-item__arrow"></i>
      </div>
    </a>
    <a href="#" class="hotel-menu-item">
      <div class="hotel-menu-item__left">
        <div class="hotel-menu-item__icon"><i class="bi bi-headset"></i></div>
        <span class="hotel-menu-item__label">고객센터</span>
      </div>
      <div class="hotel-menu-item__right">
        <i class="bi bi-chevron-right hotel-menu-item__arrow"></i>
      </div>
    </a>
  </div>

  <!-- 앱 정보 -->
  <div class="hotel-menu-group">
    <p class="hotel-menu-group__title">앱 정보</p>
    <a href="#" class="hotel-menu-item">
      <div class="hotel-menu-item__left">
        <div class="hotel-menu-item__icon"><i class="bi bi-file-text"></i></div>
        <span class="hotel-menu-item__label">이용약관</span>
      </div>
      <div class="hotel-menu-item__right">
        <i class="bi bi-chevron-right hotel-menu-item__arrow"></i>
      </div>
    </a>
    <a href="#" class="hotel-menu-item">
      <div class="hotel-menu-item__left">
        <div class="hotel-menu-item__icon"><i class="bi bi-shield-check"></i></div>
        <span class="hotel-menu-item__label">개인정보처리방침</span>
      </div>
      <div class="hotel-menu-item__right">
        <i class="bi bi-chevron-right hotel-menu-item__arrow"></i>
      </div>
    </a>
    <button class="hotel-menu-item" onclick="window.navigate ? window.navigate('settings') : (location.hash = '#settings')">
      <div class="hotel-menu-item__left">
        <div class="hotel-menu-item__icon"><i class="bi bi-gear"></i></div>
        <span class="hotel-menu-item__label">설정</span>
      </div>
      <div class="hotel-menu-item__right">
        <i class="bi bi-chevron-right hotel-menu-item__arrow"></i>
      </div>
    </button>
    <div class="hotel-menu-item" style="cursor:default;">
      <div class="hotel-menu-item__left">
        <div class="hotel-menu-item__icon"><i class="bi bi-info-circle"></i></div>
        <span class="hotel-menu-item__label">앱 버전</span>
      </div>
      <div class="hotel-menu-item__right">
        <span class="hotel-menu-item__value">1.0.0 (최신)</span>
      </div>
    </div>
  </div>

  <div class="hotel-app-version">
    <p class="hotel-app-version__text">© 2024 App Hotel. All rights reserved.</p>
  </div>

</main>
