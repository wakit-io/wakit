<!-- 숙박 찜목록 페이지 -->
<link rel="stylesheet" href="css/hotel-wishlist.css">

<main class="hotel-wishlist-page" role="main">

  <!-- 페이지 헤더 -->
  <div class="wishlist-header">
    <h1 class="wishlist-header__title">찜목록</h1>
    <span class="wishlist-header__count" id="wishlistCount">3개</span>
  </div>

  <!-- 탭 -->
  <nav class="wishlist-tabs" role="tablist">
    <button class="wishlist-tabs__item is-active" role="tab" data-wishlist-tab="all">전체</button>
    <button class="wishlist-tabs__item" role="tab" data-wishlist-tab="hotel">호텔·리조트</button>
    <button class="wishlist-tabs__item" role="tab" data-wishlist-tab="pension">펜션</button>
    <button class="wishlist-tabs__item" role="tab" data-wishlist-tab="villa">홈&빌라</button>
  </nav>

  <!-- 찜 목록 그리드 (아이템 있을 때) -->
  <div class="wishlist-grid" id="wishlistGrid">

    <a href="#hotel-detail" class="wishlist-card" data-type="hotel">
      <div class="wishlist-card__img">
        <div class="img-placeholder"><i class="bi bi-image"></i></div>
        <button class="wishlist-card__wish" aria-label="찜 해제"
          data-wish-toggle onclick="event.preventDefault(); toggleWish(this)">
          <i class="bi bi-heart-fill"></i>
        </button>
      </div>
      <div class="wishlist-card__body">
        <p class="wishlist-card__name">강릉 씨마크 호텔</p>
        <p class="wishlist-card__meta">강원 · 리조트</p>
        <div class="wishlist-card__rating">
          <i class="bi bi-star-fill"></i>
          <span>4.9 · 1,204개</span>
        </div>
        <p class="wishlist-card__price">218,000<span class="wishlist-card__price-unit">원 ~</span></p>
      </div>
    </a>

    <a href="#hotel-detail" class="wishlist-card" data-type="hotel">
      <div class="wishlist-card__img">
        <div class="img-placeholder"><i class="bi bi-image"></i></div>
        <button class="wishlist-card__wish" aria-label="찜 해제"
          data-wish-toggle onclick="event.preventDefault(); toggleWish(this)">
          <i class="bi bi-heart-fill"></i>
        </button>
      </div>
      <div class="wishlist-card__body">
        <p class="wishlist-card__name">더 플라자 호텔 서울</p>
        <p class="wishlist-card__meta">서울 · 5성급 · 호텔</p>
        <div class="wishlist-card__rating">
          <i class="bi bi-star-fill"></i>
          <span>4.9</span>
        </div>
        <span class="wishlist-card__coupon">최대 15% 쿠폰</span>
        <p class="wishlist-card__price">320,000<span class="wishlist-card__price-unit">원 ~</span></p>
      </div>
    </a>

    <a href="#hotel-detail" class="wishlist-card" data-type="pension">
      <div class="wishlist-card__img">
        <div class="img-placeholder"><i class="bi bi-image"></i></div>
        <button class="wishlist-card__wish" aria-label="찜 해제"
          data-wish-toggle onclick="event.preventDefault(); toggleWish(this)">
          <i class="bi bi-heart-fill"></i>
        </button>
      </div>
      <div class="wishlist-card__body">
        <p class="wishlist-card__name">강릉 파인힐 펜션</p>
        <p class="wishlist-card__meta">강원 · 펜션</p>
        <div class="wishlist-card__rating">
          <i class="bi bi-star-fill"></i>
          <span>4.8</span>
        </div>
        <p class="wishlist-card__price">209,900<span class="wishlist-card__price-unit">원 ~</span></p>
      </div>
    </a>

  </div>

  <!-- 빈 상태 (기본 숨김) -->
  <div class="wishlist-empty" id="wishlistEmpty" style="display:none;">
    <div class="wishlist-empty__icon">
      <i class="bi bi-heart"></i>
    </div>
    <p class="wishlist-empty__title">찜한 숙소가 없어요</p>
    <p class="wishlist-empty__desc">마음에 드는 숙소를 찜해두면<br>여기서 모아볼 수 있어요</p>
    <a href="#home" class="wishlist-empty__btn">숙소 둘러보기</a>
  </div>

</main>

<script>
(function() {
  // 탭 필터
  document.querySelectorAll('[data-wishlist-tab]').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('[data-wishlist-tab]').forEach(function(t) {
        t.classList.remove('is-active');
      });
      this.classList.add('is-active');

      var type = this.getAttribute('data-wishlist-tab');
      var cards = document.querySelectorAll('.wishlist-card');
      cards.forEach(function(card) {
        if (type === 'all' || card.getAttribute('data-type') === type) {
          card.style.display = '';
        } else {
          card.style.display = 'none';
        }
      });
      updateCount();
    });
  });

  function updateCount() {
    var visible = document.querySelectorAll('.wishlist-card:not([style*="display: none"])').length;
    var countEl = document.getElementById('wishlistCount');
    var emptyEl = document.getElementById('wishlistEmpty');
    var gridEl = document.getElementById('wishlistGrid');
    if (countEl) countEl.textContent = visible + '개';
    if (emptyEl && gridEl) {
      emptyEl.style.display = visible === 0 ? '' : 'none';
      gridEl.style.display = visible === 0 ? 'none' : '';
    }
  }

  updateCount();
})();

function toggleWish(btn) {
  var card = btn.closest('.wishlist-card');
  if (!card) return;
  // 찜 해제 시 카드 제거 (애니메이션)
  card.style.transition = 'opacity 0.2s, transform 0.2s';
  card.style.opacity = '0';
  card.style.transform = 'scale(0.95)';
  setTimeout(function() {
    card.remove();
    var visible = document.querySelectorAll('.wishlist-card').length;
    var countEl = document.getElementById('wishlistCount');
    var emptyEl = document.getElementById('wishlistEmpty');
    var gridEl = document.getElementById('wishlistGrid');
    if (countEl) countEl.textContent = visible + '개';
    if (emptyEl && gridEl) {
      emptyEl.style.display = visible === 0 ? '' : 'none';
      gridEl.style.display = visible === 0 ? 'none' : '';
    }
  }, 200);
}
</script>
