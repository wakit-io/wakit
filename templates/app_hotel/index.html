<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>숙박 — 최고의 숙소를 가장 빠르게</title>
  <meta name="description" content="호텔, 리조트, 펜션, 홈&빌라까지. 원하는 숙소를 쉽고 빠르게 예약하세요.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#006fff">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/foundation/color.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--color-bg-primary, #fff);
      color: var(--color-text-primary, #17191a);
      -webkit-font-smoothing: antialiased;
    }

    /* ── 전체 래퍼 ── */
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* ── 상단 헤더 ── */
    .landing-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 0;
    }
    .landing-logo {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }
    .landing-logo__icon {
      width: 32px;
      height: 32px;
      background: #006fff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1rem;
    }
    .landing-logo__name {
      font-size: 1.125rem;
      font-weight: 800;
      color: var(--color-text-primary, #17191a);
      letter-spacing: -0.5px;
    }
    .landing-header__login {
      font-size: 0.875rem;
      font-weight: 600;
      color: #006fff;
      text-decoration: none;
      padding: 6px 14px;
      border: 1.5px solid #006fff;
      border-radius: 20px;
    }

    /* ── 히어로 ── */
    .landing-hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 24px;
      text-align: center;
    }
    .landing-hero__visual {
      width: 200px;
      height: 200px;
      border-radius: 32px;
      background: linear-gradient(135deg, #e0f0ff 0%, #c7dfff 50%, #d4ecff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      margin-bottom: 32px;
      box-shadow: 0 20px 60px rgba(0, 111, 255, 0.15);
    }
    .landing-hero__title {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--color-text-primary, #17191a);
      line-height: 1.25;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    .landing-hero__title span { color: #006fff; }
    .landing-hero__desc {
      font-size: 0.9375rem;
      color: var(--color-text-tertiary, #8c9499);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    /* ── CTA 버튼 ── */
    .landing-cta {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }
    .landing-cta__btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 1rem;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .landing-cta__btn:active { opacity: 0.85; transform: scale(0.98); }
    .landing-cta__btn--primary {
      background: #006fff;
      color: #fff;
      box-shadow: 0 4px 20px rgba(0, 111, 255, 0.3);
    }
    .landing-cta__btn--secondary {
      background: var(--color-bg-secondary, #f2f8fc);
      color: var(--color-text-primary, #17191a);
    }

    /* ── 기능 소개 ── */
    .landing-features {
      padding: 0 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .landing-feature {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: var(--color-bg-secondary, #f2f8fc);
      border-radius: 14px;
    }
    .landing-feature__icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.375rem;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .landing-feature__title {
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--color-text-primary, #17191a);
      margin-bottom: 2px;
    }
    .landing-feature__desc {
      font-size: 0.8125rem;
      color: var(--color-text-tertiary, #8c9499);
      line-height: 1.4;
    }

    /* ── 하단 ── */
    .landing-footer {
      padding: 0 24px 40px;
      text-align: center;
    }
    .landing-footer p {
      font-size: 0.75rem;
      color: var(--color-text-tertiary, #8c9499);
      line-height: 1.6;
    }
    .landing-footer a {
      color: var(--color-text-tertiary, #8c9499);
      text-decoration: underline;
    }

    /* ── 배경 장식 ── */
    .landing-bg-circle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
    }
    .landing-bg-circle--1 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(0,111,255,0.07) 0%, transparent 70%);
      top: -80px; right: -80px;
    }
    .landing-bg-circle--2 {
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(0,111,255,0.05) 0%, transparent 70%);
      bottom: 100px; left: -60px;
    }
  </style>
</head>
<body>

<div class="landing-bg-circle landing-bg-circle--1"></div>
<div class="landing-bg-circle landing-bg-circle--2"></div>

<div class="landing">

  <!-- 헤더 -->
  <header class="landing-header">
    <a class="landing-logo" href="#">
      <div class="landing-logo__icon"><i class="bi bi-house-heart-fill"></i></div>
      <span class="landing-logo__name">숙박</span>
    </a>
    <a class="landing-header__login" href="app.html#mypage">로그인</a>
  </header>

  <!-- 히어로 -->
  <section class="landing-hero">
    <div class="landing-hero__visual">🏨</div>
    <h1 class="landing-hero__title">최고의 숙소를<br><span>가장 빠르게</span></h1>
    <p class="landing-hero__desc">
      호텔·리조트부터 펜션·홈&빌라까지<br>
      원하는 숙소를 쉽고 빠르게 예약하세요
    </p>
    <div class="landing-cta">
      <a class="landing-cta__btn landing-cta__btn--primary" href="app.html">
        <i class="bi bi-arrow-right-circle-fill"></i>
        지금 시작하기
      </a>
      <a class="landing-cta__btn landing-cta__btn--secondary" href="app.html#search">
        <i class="bi bi-search"></i>
        숙소 둘러보기
      </a>
    </div>
  </section>

  <!-- 기능 소개 -->
  <section class="landing-features">
    <div class="landing-feature">
      <div class="landing-feature__icon">🔍</div>
      <div class="landing-feature__text">
        <p class="landing-feature__title">스마트 검색</p>
        <p class="landing-feature__desc">날짜·인원·지역별로 딱 맞는 숙소를 빠르게 찾아보세요</p>
      </div>
    </div>
    <div class="landing-feature">
      <div class="landing-feature__icon">💙</div>
      <div class="landing-feature__text">
        <p class="landing-feature__title">찜 & 비교</p>
        <p class="landing-feature__desc">마음에 드는 숙소를 찜해두고 한 번에 비교하세요</p>
      </div>
    </div>
    <div class="landing-feature">
      <div class="landing-feature__icon">🏷️</div>
      <div class="landing-feature__text">
        <p class="landing-feature__title">최저가 보장</p>
        <p class="landing-feature__desc">쿠폰·특가·기획전으로 가장 합리적인 가격에 예약</p>
      </div>
    </div>
  </section>

  <!-- 하단 -->
  <footer class="landing-footer">
    <p>
      시작하면 <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에<br>동의하는 것으로 간주됩니다.
    </p>
  </footer>

</div>

</body>
</html>
