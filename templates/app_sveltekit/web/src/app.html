<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <!-- shared content styles (single source for web + app) -->
  <link rel="stylesheet" href="%sveltekit.assets%/app-shared.css" />
  <!-- theme: same script the app uses (key 'blog-theme', sets [data-theme]); prevents FOUC -->
  <script src="/app/js/theme-init.js"></script>
  %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
  <div style="display: contents">%sveltekit.body%</div>
  <!-- theme toggle delegation — same script as the app. data-spa-ignore so the app
       (which has its own copy) strips it when it fetches this page. -->
  <script src="/app/js/theme-toggle.js" data-spa-ignore></script>
</body>
</html>
