<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>App Astro</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="msapplication-tap-highlight" content="no">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#6366f1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
  <link rel="stylesheet" href="/wakit/css/wakit.css">
  <link rel="stylesheet" href="/wakit/css/styleGuide.css">
  <link rel="stylesheet" href="/wakit/css/component.css">
  <link rel="stylesheet" href="/wakit/css/wakit-popup.css">
  <!-- Design tokens (color/spacing/typography). SPA views mark token links as data-spa-ignore, so the shell must load them for colors to apply -->
  <link rel="stylesheet" href="./css/foundation/index.css">
  <link rel="stylesheet" href="./css/style.css">
  <!-- shared content styles: same file the Astro web shell loads, so Astro pages
       fetched into the app render identically (injected pages drop their own <head>) -->
  <link rel="stylesheet" href="/app-shared.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    window.sb = supabase.createClient(
      'http://127.0.0.1:54321',
      'sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH'
    );
  </script>
  <!-- Dark/light initial value (prevents FOUC, same key as web shell: blog-theme) -->
  <script src="./js/theme-init.js"></script>
</head>
<body id="root">
  <script type="module">
    import Core from "/wakit/js/wakit.js";
    Core.initApp('./wakitConfig.json');
    const isLocalDev = ['localhost', '127.0.0.1'].includes(location.hostname);
    if ('serviceWorker' in navigator && !isLocalDev) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/wakit/service-worker.js');
      });
    }
  </script>
  <script src="/wakit/js/wakit-popup.js"></script>
  <script>window.Popup && Popup.init();</script>
  <script src="./js/theme-toggle.js"></script>
</body>
</html>
