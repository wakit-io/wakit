<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>App Test</title>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TestApp">
  <meta name="msapplication-tap-highlight" content="no">
  <meta name="theme-color" content="#6366f1">
  <link rel="manifest" href="./manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/foundation/color.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--color-bg-primary, #fff);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── 인트로 ── */
    .intro {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #6366f1;
      animation: introFadeIn 0.6s ease;
    }
    @keyframes introFadeIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

    .intro__icon {
      width: 90px; height: 90px; border-radius: 24px;
      background: rgba(255,255,255,0.2); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; margin-bottom: 20px;
      animation: iconPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
    }
    @keyframes iconPop { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }

    .intro__title {
      font-size: 2rem; font-weight: 800; color: #fff;
      letter-spacing: -0.5px; margin-bottom: 8px;
      animation: slideUp 0.4s ease 0.5s both;
    }
    .intro__subtitle {
      font-size: 0.9375rem; color: rgba(255,255,255,0.7);
      margin-bottom: 60px;
      animation: slideUp 0.4s ease 0.6s both;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    .intro__dots {
      display: flex; gap: 8px; margin-bottom: 48px;
      animation: slideUp 0.4s ease 0.7s both;
    }
    .intro__dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.4);
    }
    .intro__dot.is-active { background: #fff; width: 24px; border-radius: 4px; }

    .intro__cta {
      display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; max-width: 320px;
      animation: slideUp 0.4s ease 0.8s both;
    }
    .intro__btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 1rem 0; border-radius: 16px;
      font-size: 1rem; font-weight: 700; cursor: pointer; border: none;
      text-decoration: none; transition: opacity 0.15s, transform 0.1s;
    }
    .intro__btn:active { opacity: 0.85; transform: scale(0.98); }
    .intro__btn--primary { background: #fff; color: #6366f1; }
    .intro__btn--ghost {
      background: rgba(255,255,255,0.15); color: #fff;
      backdrop-filter: blur(4px);
    }

    .intro__footer {
      position: absolute; bottom: 32px; left: 0; right: 0; text-align: center;
      font-size: 0.75rem; color: rgba(255,255,255,0.45);
      animation: slideUp 0.4s ease 0.9s both;
    }

    /* ── 배경 장식 ── */
    .intro__circle {
      position: absolute; border-radius: 50%; pointer-events: none;
    }
    .intro__circle--1 {
      width: 350px; height: 350px;
      background: rgba(255,255,255,0.06);
      top: -120px; right: -100px;
    }
    .intro__circle--2 {
      width: 250px; height: 250px;
      background: rgba(255,255,255,0.04);
      bottom: 60px; left: -80px;
    }
  </style>
</head>
<body>

<div class="intro">
  <div class="intro__circle intro__circle--1"></div>
  <div class="intro__circle intro__circle--2"></div>

  <div class="intro__icon">✦</div>
  <h1 class="intro__title">App Test</h1>
  <p class="intro__subtitle">wakit hybrid framework</p>

  <div class="intro__dots">
    <div class="intro__dot is-active"></div>
    <div class="intro__dot"></div>
    <div class="intro__dot"></div>
  </div>

  <div class="intro__cta">
    <a class="intro__btn intro__btn--primary" href="app.html">
      <i class="bi bi-arrow-right-circle-fill"></i>
      시작하기
    </a>
    <a class="intro__btn intro__btn--ghost" href="app.html#explore">
      먼저 둘러보기
    </a>
  </div>

  <p class="intro__footer">시작하면 이용약관에 동의하는 것으로 간주됩니다</p>
</div>

</body>
</html>
