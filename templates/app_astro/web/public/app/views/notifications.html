<!-- 알림 -->
<link rel="stylesheet" href="./css/notify.css">

<main class="notify-page">

  <div class="notify-header">
    <span class="notify-header__title">알림</span>
    <button class="notify-header__btn">모두 읽음</button>
  </div>

  <p class="notify-date">오늘</p>

  <div class="notify-item is-unread">
    <div class="notify-item__icon notify-item__icon--purple">✦</div>
    <div class="notify-item__body">
      <p class="notify-item__title">새 콘텐츠가 추가됐어요</p>
      <p class="notify-item__desc">UI 디자인 카테고리에 새로운 항목이 48개 추가됐습니다.</p>
      <p class="notify-item__time">방금 전</p>
    </div>
    <div class="notify-item__dot"></div>
  </div>

  <div class="notify-item is-unread">
    <div class="notify-item__icon notify-item__icon--green">🎉</div>
    <div class="notify-item__body">
      <p class="notify-item__title">탐색 추천</p>
      <p class="notify-item__desc">회원님의 관심사 기반으로 콘텐츠를 추천해 드릴게요.</p>
      <p class="notify-item__time">10분 전</p>
    </div>
    <div class="notify-item__dot"></div>
  </div>

  <div class="notify-item">
    <div class="notify-item__icon notify-item__icon--yellow">⚡</div>
    <div class="notify-item__body">
      <p class="notify-item__title">시스템 업데이트</p>
      <p class="notify-item__desc">앱이 최신 버전으로 업데이트됐습니다. 새로운 기능을 확인해보세요.</p>
      <p class="notify-item__time">1시간 전</p>
    </div>
  </div>

  <p class="notify-date">어제</p>

  <div class="notify-item">
    <div class="notify-item__icon notify-item__icon--red">🔥</div>
    <div class="notify-item__body">
      <p class="notify-item__title">트렌드 알림</p>
      <p class="notify-item__desc">지금 가장 인기 있는 콘텐츠를 확인해보세요.</p>
      <p class="notify-item__time">어제 오후 3:24</p>
    </div>
  </div>

  <div class="notify-item">
    <div class="notify-item__icon notify-item__icon--purple">👋</div>
    <div class="notify-item__body">
      <p class="notify-item__title">TestApp에 오신 걸 환영해요!</p>
      <p class="notify-item__desc">wakit 하이브리드 프레임워크로 만들어진 앱입니다.</p>
      <p class="notify-item__time">어제 오전 10:00</p>
    </div>
  </div>

</main>
