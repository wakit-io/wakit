<!-- 프로필 -->
<link rel="stylesheet" href="./css/profile.css">

<main class="profile-page">

  <div class="profile-header">
    <span class="profile-header__title">프로필</span>
    <button class="profile-header__btn"><i class="bi bi-gear"></i></button>
  </div>

  <!-- 비로그인 상태 -->
  <div id="guestCard" class="profile-guest" style="display:none">
    <div class="profile-guest__icon">👤</div>
    <p class="profile-guest__title">로그인이 필요합니다</p>
    <p class="profile-guest__sub">회원가입 또는 로그인 후 이용해주세요</p>
    <a class="profile-guest__btn" href="#signup">회원가입</a>
    <a class="profile-guest__btn profile-guest__btn--outline" href="#login">로그인</a>
  </div>

  <!-- 로그인 상태 -->
  <div id="userCard" class="profile-card" style="display:none">
    <div class="profile-card__avatar">😊</div>
    <div class="profile-card__info">
      <p class="profile-card__name" id="profileName">-</p>
      <p class="profile-card__email" id="profileEmail">-</p>
      <button class="profile-card__edit"><i class="bi bi-pencil"></i> 프로필 편집</button>
    </div>
  </div>

  <div class="profile-stats">
    <div class="profile-stat">
      <p class="profile-stat__num">12</p>
      <p class="profile-stat__label">저장됨</p>
    </div>
    <div class="profile-stat">
      <p class="profile-stat__num">48</p>
      <p class="profile-stat__label">팔로잉</p>
    </div>
    <div class="profile-stat">
      <p class="profile-stat__num">256</p>
      <p class="profile-stat__label">팔로워</p>
    </div>
  </div>

  <div class="profile-menu-group">
    <p class="profile-menu-label">계정</p>
    <div class="profile-menu-item">
      <div class="profile-menu-item__left">
        <div class="profile-menu-item__icon profile-menu-item__icon--purple">🔔</div>
        <span class="profile-menu-item__label">알림 설정</span>
      </div>
      <div class="profile-menu-item__right">
        <span class="profile-menu-item__badge">2</span>
        <i class="bi bi-chevron-right"></i>
      </div>
    </div>
    <div class="profile-menu-item">
      <div class="profile-menu-item__left">
        <div class="profile-menu-item__icon profile-menu-item__icon--green">🔒</div>
        <span class="profile-menu-item__label">개인정보 보호</span>
      </div>
      <div class="profile-menu-item__right"><i class="bi bi-chevron-right"></i></div>
    </div>
    <div class="profile-menu-item">
      <div class="profile-menu-item__left">
        <div class="profile-menu-item__icon profile-menu-item__icon--yellow">💳</div>
        <span class="profile-menu-item__label">구독 관리</span>
      </div>
      <div class="profile-menu-item__right"><i class="bi bi-chevron-right"></i></div>
    </div>
  </div>

  <div class="profile-menu-group">
    <p class="profile-menu-label">환경설정</p>
    <div class="profile-theme-toggle">
      <span class="profile-menu-item__label">다크 모드</span>
      <button class="profile-theme-switch" id="themeSwitch" aria-label="다크모드 전환"></button>
    </div>
    <div class="profile-menu-item">
      <div class="profile-menu-item__left">
        <div class="profile-menu-item__icon profile-menu-item__icon--purple">🌐</div>
        <span class="profile-menu-item__label">언어 설정</span>
      </div>
      <div class="profile-menu-item__right">
        <span style="font-size:0.8125rem;color:var(--color-text-tertiary)">한국어</span>
        <i class="bi bi-chevron-right"></i>
      </div>
    </div>
  </div>

  <div class="profile-menu-group">
    <p class="profile-menu-label">앱 정보</p>
    <div class="profile-menu-item">
      <div class="profile-menu-item__left">
        <div class="profile-menu-item__icon profile-menu-item__icon--green">📋</div>
        <span class="profile-menu-item__label">이용약관</span>
      </div>
      <div class="profile-menu-item__right"><i class="bi bi-chevron-right"></i></div>
    </div>
    <div class="profile-menu-item">
      <div class="profile-menu-item__left">
        <div class="profile-menu-item__icon profile-menu-item__icon--yellow">✨</div>
        <span class="profile-menu-item__label">버전 정보</span>
      </div>
      <div class="profile-menu-item__right">
        <span style="font-size:0.8125rem;color:var(--color-text-tertiary)">v1.0.0</span>
      </div>
    </div>
    <div class="profile-menu-item" id="menuLogout" style="border-bottom:none;display:none">
      <div class="profile-menu-item__left">
        <div class="profile-menu-item__icon profile-menu-item__icon--red">🚪</div>
        <span class="profile-menu-item__label" style="color:#ef4444">로그아웃</span>
      </div>
    </div>
  </div>

</main>

<script>
(function() {
  var sw = document.getElementById('themeSwitch');
  if (sw) {
    sw.classList.toggle('is-dark', document.documentElement.getAttribute('data-theme') === 'dark');
  }
})();

(async function() {
  // 비로그인 상태 기본 표시
  document.getElementById('guestCard').style.display = '';
  document.getElementById('userCard').style.display  = 'none';
  document.getElementById('menuLogout').style.display = 'none';

  if (!window.sb) return;

  try {
    var result = await window.sb.auth.getUser();
    var user = result.data && result.data.user;

    if (user) {
      document.getElementById('guestCard').style.display = 'none';
      document.getElementById('userCard').style.display  = '';
      document.getElementById('menuLogout').style.display = '';
      document.getElementById('profileName').textContent  =
        (user.user_metadata && user.user_metadata.username) || user.email.split('@')[0];
      document.getElementById('profileEmail').textContent = user.email;
    }

    document.getElementById('menuLogout').addEventListener('click', async function() {
      await window.sb.auth.signOut();
      location.reload();
    });
  } catch(e) {}
})();
</script>
