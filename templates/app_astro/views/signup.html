<!-- 회원가입 -->
<link rel="stylesheet" href="./css/signup.css">

<main class="signup-page">
  <div class="signup-box">

    <div class="signup-logo">
      <span class="signup-logo__icon">✨</span>
      <p class="signup-logo__title">App Test</p>
      <p class="signup-logo__sub">새 계정을 만들어보세요</p>
    </div>

    <form class="signup-form" id="signupForm" novalidate>
      <div class="signup-field">
        <label class="signup-field__label" for="signupUsername">아이디</label>
        <input class="signup-field__input" id="signupUsername" type="text"
          placeholder="사용할 아이디 입력" autocomplete="username" required>
      </div>

      <div class="signup-field">
        <label class="signup-field__label" for="signupEmail">이메일</label>
        <input class="signup-field__input" id="signupEmail" type="email"
          placeholder="이메일 주소 입력" autocomplete="email" required>
      </div>

      <div class="signup-field">
        <label class="signup-field__label" for="signupPassword">비밀번호</label>
        <input class="signup-field__input" id="signupPassword" type="password"
          placeholder="6자 이상 입력" autocomplete="new-password" required minlength="6">
      </div>

      <button class="signup-btn" type="submit" id="signupBtn">회원가입</button>
      <p class="signup-msg" id="signupMsg"></p>
    </form>

    <div class="signup-footer">
      이미 계정이 있으신가요? <a href="#login">로그인</a>
    </div>

  </div>
</main>

<script>
(function() {
  var form = document.getElementById('signupForm');
  var btn  = document.getElementById('signupBtn');
  var msg  = document.getElementById('signupMsg');

  function showMsg(text, type) {
    msg.textContent = text;
    msg.className = 'signup-msg' + (type ? ' signup-msg--' + type : '');
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    var username = document.getElementById('signupUsername').value.trim();
    var email    = document.getElementById('signupEmail').value.trim();
    var password = document.getElementById('signupPassword').value;

    if (!username || !email || !password) {
      showMsg('모든 항목을 입력해주세요.', 'error'); return;
    }
    if (password.length < 6) {
      showMsg('비밀번호는 6자 이상이어야 합니다.', 'error'); return;
    }

    btn.disabled = true;
    showMsg('처리 중...', '');

    var result = await window.sb.auth.signUp({
      email: email,
      password: password,
      options: { data: { username: username } }
    });

    if (result.error) {
      showMsg(result.error.message, 'error');
      btn.disabled = false;
    } else {
      showMsg('회원가입 완료! 프로필 페이지로 이동합니다.', 'success');
      setTimeout(function() {
        location.hash = '#profile';
      }, 1200);
    }
  });
})();
</script>
