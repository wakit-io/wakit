<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>문의하기 2</title>
  <script src="../../../wakit/js/wakit-bridge.js" data-spa-ignore></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" data-spa-ignore >
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-rounded/css/uicons-solid-rounded.css' data-spa-ignore>
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css' data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/wakit.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/styleGuide.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/component.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/wakit-popup.css">
  
  <script src="js/theme-init.js" data-spa-ignore></script>
</head>
<body>

<!-- Foundation Design Tokens (base 태그로 인해 css/ 경로 사용) -->
<link rel="stylesheet" href="css/foundation/color.css">
<link rel="stylesheet" href="css/foundation/buttons.css">
<link rel="stylesheet" href="css/foundation/badge.css">
<link rel="stylesheet" href="css/foundation/spacing.css">
<link rel="stylesheet" href="css/foundation/typography.css">
<link rel="stylesheet" href="css/foundation/effect.css">
<link rel="stylesheet" href="css/foundation/layout.css">
<link rel="stylesheet" href="css/foundation/icons.css">
<link rel="stylesheet" href="css/foundation/graphic.css">
<!-- Blog Styles -->
<link rel="stylesheet" href="css/style.css">
<!-- Contact Page Styles -->
<link rel="stylesheet" href="css/contact-2.css">
<!-- 초기 테마 설정 (FOUC 방지) -->

<!-- 데스크톱 헤더 -->
<div data-include="../wakit-components/header.html" data-include-when="web"></div>

<main class="contact-2-page">
  <!-- Page Header Section (Desktop / Mobile) -->
  <section class="contact-2-header-section">
    <div class="contact-2-header-container">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <ol class="breadcrumb-list">
          <li class="breadcrumb-item">
            <a href="index.html" class="breadcrumb-link">
              <i class="bi bi-house" aria-hidden="true"></i>
              <span>홈</span>
            </a>
          </li>
          <li class="breadcrumb-item">
            <i class="bi bi-chevron-right" aria-hidden="true"></i>
            <span class="breadcrumb-current">문의하기</span>
          </li>
        </ol>
      </nav>
      <div class="contact-2-header-content">
        <h1 class="contact-2-main-title">문의하기</h1>
      </div>
    </div>
  </section>

  <!-- Contact Section: Form + Cards -->
  <section class="contact-2-section">
    <div class="contact-2-container">
      <div class="contact-2-row">
        <!-- Form Container -->
        <div class="contact-2-form-wrap">
          <h2 class="contact-2-form-title">꿈을 향한 첫걸음</h2>
          <form class="contact-2-form" action="#" method="post">
            <div class="contact-2-input-field">
              <label for="contact-2-name" class="contact-2-input-label">이름</label>
              <div class="contact-2-input-wrapper">
                <i class="bi bi-person contact-2-input-icon" aria-hidden="true"></i>
                <input type="text" id="contact-2-name" name="name" placeholder="이름을 입력해주세요." required>
              </div>
              <!-- <span class="contact-2-input-helper">체계적인 분석</span> -->
            </div>
            <div class="contact-2-input-field">
              <label for="contact-2-email" class="contact-2-input-label">이메일</label>
              <div class="contact-2-input-wrapper">
                <i class="bi bi-envelope contact-2-input-icon" aria-hidden="true"></i>
                <input type="email" id="contact-2-email" name="email" placeholder="이메일을 입력해주세요." required>
              </div>
              <!-- <span class="contact-2-input-helper">효과적인 전략</span> -->
            </div>
            <div class="contact-2-input-field">
              <label for="contact-2-phone" class="contact-2-input-label">연락처</label>
              <div class="contact-2-input-wrapper">
                <i class="bi bi-telephone contact-2-input-icon" aria-hidden="true"></i>
                <input type="tel" id="contact-2-phone" name="phone" placeholder="연락처를 입력해주세요." required>
              </div>
              <!-- <span class="contact-2-input-helper">안정적인 운영</span> -->
            </div>
            <div class="contact-2-input-field">
              <label for="contact-2-message" class="contact-2-input-label">문의 내용</label>
              <div class="contact-2-textarea-wrapper">
                <textarea id="contact-2-message" name="message" placeholder="문의 내용을 입력해주세요." rows="4" maxlength="1000" required></textarea>
              </div>
              <div class="contact-2-textarea-count">
                <span class="contact-2-textarea-count-current">0</span>
                <span class="contact-2-textarea-count-max">혁신적인 도구</span>
              </div>
            </div>
            <button type="submit" class="btn btn--primary btn--l contact-2-submit-btn">
              <span>보내기</span>
            </button>
          </form>
        </div>
        <!-- Contact Cards -->
        <div class="contact-2-cards">
          <div class="contact-2-card">
            <i class="bi bi-geo-alt contact-2-card-icon" aria-hidden="true"></i>
            <h3 class="contact-2-card-title">혁신적인 접근</h3>
            <p class="contact-2-card-text">효율적인 프로세스와 체계적인 관리로 성공을 지원합니다.</p>
            <a href="#" class="contact-2-card-link">이건 링크</a>
          </div>
          <div class="contact-2-card">
            <i class="bi bi-envelope contact-2-card-icon" aria-hidden="true"></i>
            <h3 class="contact-2-card-title">이메일</h3>
            <p class="contact-2-card-text">24시간 이내에 답변을 드리겠습니다</p>
            <a href="mailto:sample@example.com" class="contact-2-card-link">sample@example.com</a>
          </div>
          <div class="contact-2-card">
            <i class="bi bi-telephone contact-2-card-icon" aria-hidden="true"></i>
            <h3 class="contact-2-card-title">창의적인 해결책</h3>
            <p class="contact-2-card-text">언제든지 편하게 연락주세요</p>
            <a href="tel:+82100000000" class="contact-2-card-link">+82 10-000-0000</a>
          </div>
        </div>
      </div>

      <!-- Map Section -->
      <div class="contact-2-map-wrap">
        <h2 class="contact-2-map-title">오시는 길</h2>
        <div class="contact-2-map">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3165.301884789123!2d127.02761031531098!3d37.49794227980845!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357ca15aee9ab9cb%3A0x8e21e01f3b81e3a2!2z6rK96riw64-EIOyYgeyYgeuMgOq1rCDsl63sgrzrj5k!5e0!3m2!1sko!2skr!4v1234567890123!5m2!1sko!2skr"
            width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"
            referrerpolicy="no-referrer-when-downgrade" title="오시는 길 지도">
          </iframe>
        </div>
      </div>
    </div>
  </section>

  <!-- CTA Banner Section -->
  <section class="contact-2-cta-banner-section">
    <div class="contact-2-cta-banner-container">
      <div class="contact-2-cta-banner">
        <p class="contact-2-cta-banner-lead">브랜드를 만들 생각인가요?</p>
        <h2 class="contact-2-cta-banner-title">신뢰할 수 있는 동반자</h2>
        <p class="contact-2-cta-banner-desc">창의적인 아이디어와 실행력으로 차별화된 가치를 제공합니다.</p>
        <a href="#" class="btn btn--primary btn--l contact-2-cta-banner-btn">데모 실행하기 <i class="bi bi-chevron-right" aria-hidden="true"></i></a>
      </div>
    </div>
  </section>
</main>

<!-- Footer -->
<div data-include="../wakit-components/footer.html" data-include-when="web"></div>

</body>

<script src="js/scroll-to-top.js" data-spa-ignore></script>
<script src="js/contact.js"></script>

  Popup.init();
</script>
</html>
