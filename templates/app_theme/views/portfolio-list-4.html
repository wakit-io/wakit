<main class="portfolio-list-4">

  <section class="portfolio-list-4__header">
    <div class="container">
      <div class="portfolio-list-4__header-content">
        <div class="portfolio-list-4__header-left">
          <h1 class="portfolio-list-4__title">Projects</h1>
        </div>
        <div class="portfolio-list-4__header-right">
          <p class="portfolio-list-4__copyright">©2020-25</p>
          <p class="portfolio-list-4__description">지속적인 개선과 혁신으로 발전하는 파트너가 되겠습니다.</p>
        </div>
      </div>
      <div class="portfolio-list-4__filters">
        <div class="portfolio-list-4__search">
          <i class="bi bi-search" aria-hidden="true"></i>
          <input type="search" class="portfolio-list-4__search-input" placeholder="Search..." aria-label="검색">
        </div>
        <div class="portfolio-list-4__select">
          <select class="portfolio-list-4__select-input" aria-label="카테고리 선택">
            <option value="all">전체</option>
            <option value="uxui">UX/UI</option>
            <option value="graphic">그래픽 디자인</option>
            <option value="branding">브랜딩</option>
            <option value="motion">모션 디자인</option>
          </select>
          <i class="bi bi-chevron-down portfolio-list-4__select-icon" aria-hidden="true"></i>
        </div>
      </div>
    </div>
  </section>

              <div class="portfolio-list-4__item-overlay"></div>
            </figure>
            <div class="portfolio-list-4__item-info">
              <h3 class="portfolio-list-4__item-title">더 나은 내일을 향해</h3>

            </div>
          </a>
        </article>

        <button type="button" class="portfolio-list-4__load-more-button btn btn--secondary btn--m">
          <span>더보기</span>
        </button>
      </div>
