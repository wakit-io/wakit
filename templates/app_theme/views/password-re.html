<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="wakit:no-dv-title" content="1">
  <title>비밀번호 재설정</title>
  <script src="../../../wakit/js/wakit-bridge.js" data-spa-ignore></script>
  <!-- 웹 단독 사용 시 전역 CSS를 넣고 싶다면 아래와 같이 사용 (SPA 주입 시 무시하려면 data-spa-ignore 추가)-->
  <!-- <link rel="stylesheet" href="../../../wakit/css/base.css" data-spa-ignore /> -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" data-spa-ignore >
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-rounded/css/uicons-solid-rounded.css' data-spa-ignore>
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css' data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/wakit.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/styleGuide.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/component.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/wakit-popup.css">
  
</head>
<body>

<!-- Foundation Design Tokens (base 태그로 인해 css/ 경로 사용) -->
<link rel="stylesheet" href="css/foundation/color.css">
<link rel="stylesheet" href="css/foundation/buttons.css">
<link rel="stylesheet" href="css/foundation/badge.css">
<link rel="stylesheet" href="css/foundation/spacing.css">
<link rel="stylesheet" href="css/foundation/typography.css">
<link rel="stylesheet" href="css/foundation/effect.css">
<link rel="stylesheet" href="css/foundation/layout.css">
<link rel="stylesheet" href="css/foundation/icons.css">
<link rel="stylesheet" href="css/foundation/graphic.css">
<!-- Blog Styles -->
<link rel="stylesheet" href="css/style.css">
<!-- Password Reset (재설정) Page Styles -->
<link rel="stylesheet" href="css/password-re.css">

<!-- 모바일 헤더 -->
<header class="password-reset-mobile-header" data-include-when="mobile">
  <button class="password-reset-mobile-header__button" aria-label="뒤로 가기">
    <i class="bi bi-chevron-left" aria-hidden="true"></i>
  </button>
  <div class="password-reset-mobile-header__logo" aria-label="로고"></div>
  <button class="password-reset-mobile-header__button" aria-label="메뉴">
    <i class="bi bi-list" aria-hidden="true"></i>
  </button>
</header>

<!-- 데스크톱 헤더 -->
<div data-include="../wakit-components/header.html" data-include-when="web"></div>

<main class="password-reset-page">
  <div class="password-reset-container">
    <!-- Header Section -->
    <div class="password-reset-header">
      <h1 class="password-reset-title">비밀번호 재설정</h1>
    </div>

    <!-- Password Reset Form -->
    <form class="password-reset-form" action="#" method="post">
      <!-- Password Input -->
      <div class="input-field">
        <label for="password-reset-password" class="input-label">비밀번호</label>
        <div class="input-wrapper">
          <i class="bi bi-lock input-icon" aria-hidden="true"></i>
          <input type="password" id="password-reset-password" name="password" placeholder="비밀번호를 입력해주세요." required>
          <button type="button" class="input-toggle" aria-label="비밀번호 표시/숨기기">
            <i class="bi bi-eye" aria-hidden="true"></i>
          </button>
        </div>
        <!-- <span class="input-helper">검증된 결과</span> -->
      </div>

      <!-- Password Confirm Input -->
      <div class="input-field">
        <label for="password-reset-password-confirm" class="input-label">비밀번호 확인</label>
        <div class="input-wrapper">
          <i class="bi bi-lock input-icon" aria-hidden="true"></i>
          <input type="password" id="password-reset-password-confirm" name="password-confirm" placeholder="비밀번호를 재입력해주세요." required>
          <button type="button" class="input-toggle" aria-label="비밀번호 확인 표시/숨기기">
            <i class="bi bi-eye" aria-hidden="true"></i>
          </button>
        </div>
        <!-- <span class="input-helper">신속한 대응</span> -->
      </div>

      <!-- Submit Button -->
      <button type="submit" class="password-reset-button">
        <span class="password-reset-button__text">비밀번호 재설정</span>
      </button>
    </form>
  </div>
</main>

<!-- Footer -->
<div data-include="../wakit-components/footer.html" data-include-when="web"></div>

</body>
<script src="../../../wakit/js/wakit-popup.js" data-spa-ignore></script>
<script src="../js/header.js" data-spa-ignore></script>
<script src="js/theme-toggle.js" data-spa-ignore></script>
<script data-spa-ignore>
  Popup.init();
</script>
<script data-spa-ignore>
  // Password toggle functionality
  (function() {
    // Password field toggle
    const passwordInput = document.getElementById('password-reset-password');
    if (passwordInput) {
      const passwordWrapper = passwordInput.closest('.input-wrapper');
      const passwordToggle = passwordWrapper ? passwordWrapper.querySelector('.input-toggle') : null;
      
      if (passwordToggle) {
        passwordToggle.addEventListener('click', function() {
          const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordInput.setAttribute('type', type);
          
          const icon = this.querySelector('i');
          if (icon) {
            if (type === 'text') {
              icon.classList.remove('bi-eye');
              icon.classList.add('bi-eye-slash');
            } else {
              icon.classList.remove('bi-eye-slash');
              icon.classList.add('bi-eye');
            }
          }
        });
      }
    }

    // Password confirm field toggle
    const passwordConfirmInput = document.getElementById('password-reset-password-confirm');
    if (passwordConfirmInput) {
      const passwordConfirmWrapper = passwordConfirmInput.closest('.input-wrapper');
      const passwordConfirmToggle = passwordConfirmWrapper ? passwordConfirmWrapper.querySelector('.input-toggle') : null;
      
      if (passwordConfirmToggle) {
        passwordConfirmToggle.addEventListener('click', function() {
          const type = passwordConfirmInput.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordConfirmInput.setAttribute('type', type);
          
          const icon = this.querySelector('i');
          if (icon) {
            if (type === 'text') {
              icon.classList.remove('bi-eye');
              icon.classList.add('bi-eye-slash');
            } else {
              icon.classList.remove('bi-eye-slash');
              icon.classList.add('bi-eye');
            }
          }
        });
      }
    }
  })();
  
  console.log('password reset page script executed');
</script>

</html>
