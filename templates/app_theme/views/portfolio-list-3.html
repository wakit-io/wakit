<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Portfolio list 3</title>
  <script src="../../../wakit/js/wakit-bridge.js" data-spa-ignore></script>
  <!-- 웹 단독 사용 시 전역 CSS를 넣고 싶다면 아래와 같이 사용 (SPA 주입 시 무시하려면 data-spa-ignore 추가)-->
  <!-- <link rel="stylesheet" href="../../../wakit/css/base.css" data-spa-ignore /> -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" data-spa-ignore >
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-rounded/css/uicons-solid-rounded.css' data-spa-ignore>
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css' data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/wakit.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/styleGuide.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/component.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/wakit-popup.css">
  
  <!-- Blog Styles -->
  <link rel="stylesheet" href="css/style.css" data-spa-ignore>
  
  <!-- 초기 테마 설정 (FOUC 방지) -->
  <script src="js/theme-init.js" data-spa-ignore></script>
  
  <!-- 팝업창 로드 -->
  <!-- <meta name="popup:auto-url" content="wakit-popups/popuptest.html"> -->
</head>
<body>

<!-- Foundation Design Tokens (base 태그로 인해 css/ 경로 사용) -->
<link rel="stylesheet" href="css/foundation/color.css">
<link rel="stylesheet" href="css/foundation/buttons.css">
<link rel="stylesheet" href="css/foundation/badge.css">
<link rel="stylesheet" href="css/foundation/spacing.css">
<link rel="stylesheet" href="css/foundation/typography.css">
<link rel="stylesheet" href="css/foundation/effect.css">
<link rel="stylesheet" href="css/foundation/layout.css">
<link rel="stylesheet" href="css/foundation/icons.css">
<link rel="stylesheet" href="css/foundation/graphic.css">

<!-- Home Page Styles -->
<link rel="stylesheet" href="css/portfolio-list-3.css">

<div data-include="wakit-components/header.html" data-include-when="web"></div>


<main class="portfolio-list-3">
  <!-- Breadcrumbs Header Section -->
  <section class="portfolio-list-3__breadcrumbs-section">
    <div class="container">
      <nav class="portfolio-list-3__breadcrumbs" aria-label="Breadcrumb">
        <ol class="breadcrumbs">
          <li class="breadcrumbs__item">
            <a href="/" class="breadcrumbs__link">
              <i class="bi bi-house" aria-hidden="true"></i>
              <span>홈</span>
            </a>
          </li>
          <li class="breadcrumbs__item">
            <i class="bi bi-chevron-right breadcrumbs__separator" aria-hidden="true"></i>
            <a href="#" class="breadcrumbs__link">포트폴리오</a>
          </li>
        </ol>
      </nav>
    </div>
  </section>

  <!-- Header Section (제목만) -->
  <section class="portfolio-list-3__header">
    <div class="container">
      <div class="portfolio-list-3__header-content">
        <div class="portfolio-list-3__header-text">
          <h1 class="portfolio-list-3__title">포트폴리오</h1>
        </div>
      </div>
    </div>
  </section>

  <!-- 탭 + 그리드: 한 래퍼로 감싸서 sticky containing block이 페이지 전체 높이가 되도록 -->
  <div class="portfolio-list-3__tabs-and-content">
    <nav class="portfolio-list-3__tabs" aria-label="Portfolio categories">
      <div class="portfolio-list-3__tabs-inner container">
        <button type="button" class="portfolio-list-3__tab portfolio-list-3__tab--active" aria-label="All Works" aria-current="page">전체</button>
        <button type="button" class="portfolio-list-3__tab" aria-label="UX/UI">UX/UI</button>
        <button type="button" class="portfolio-list-3__tab" aria-label="Graphic Design">그래픽 디자인</button>
        <button type="button" class="portfolio-list-3__tab" aria-label="Brading">브랜딩</button>
        <button type="button" class="portfolio-list-3__tab" aria-label="Motion Design">모션 디자인</button>
      </div>
    </nav>

    <!-- Portfolio Grid Section -->
    <section class="portfolio-list-3__grid-section">
    <div class="container">
      <div class="portfolio-list-3__grid">
        <!-- Portfolio Item 1 -->
        <article class="portfolio-list-3__item portfolio-list-3__item--square">
          <a href="views/portfolio-detail-1.html" class="portfolio-list-3__item-link">
            <figure class="portfolio-list-3__item-image">
              <img src="https://demo.wakit.org/img/samples/photo-1467232004584-a241de8bcf5d.png" alt="이미지" class="portfolio-list-3__item-image-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
              <div class="portfolio-list-3__item-image-placeholder" style="display: none;"></div>
            </figure>
            <div class="portfolio-list-3__item-info">
              <h3 class="portfolio-list-3__item-title">가치 있는 선택</h3>
              <p class="portfolio-list-3__item-category">일러스트</p>
            </div>
          </a>
        </article>

        <!-- Portfolio Item 2 -->
        <article class="portfolio-list-3__item portfolio-list-3__item--square">
          <a href="views/portfolio-detail-1.html" class="portfolio-list-3__item-link">
            <figure class="portfolio-list-3__item-image">
              <img src="https://demo.wakit.org/img/samples/photo-1498050108023-c5249f4df085.png" alt="이미지" class="portfolio-list-3__item-image-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
              <div class="portfolio-list-3__item-image-placeholder" style="display: none;"></div>
            </figure>
            <div class="portfolio-list-3__item-info">
              <h3 class="portfolio-list-3__item-title">새로운 시작을 함께해요</h3>
              <p class="portfolio-list-3__item-category">일러스트</p>
            </div>
          </a>
        </article>

        <!-- Portfolio Item 3 - Full Width -->
        <article class="portfolio-list-3__item portfolio-list-3__item--full">
          <a href="views/portfolio-detail-1.html" class="portfolio-list-3__item-link">
            <figure class="portfolio-list-3__item-image">
              <img src="https://demo.wakit.org/img/samples/photo-1551650975-87deedd944c3.png" alt="이미지" class="portfolio-list-3__item-image-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
              <div class="portfolio-list-3__item-image-placeholder" style="display: none;"></div>
            </figure>
            <div class="portfolio-list-3__item-info">
              <h3 class="portfolio-list-3__item-title">더 나은 내일을 향해</h3>
              <p class="portfolio-list-3__item-category">일러스트</p>
            </div>
          </a>
        </article>

        <!-- Portfolio Item 4 -->
        <article class="portfolio-list-3__item portfolio-list-3__item--square">
          <a href="views/portfolio-detail-1.html" class="portfolio-list-3__item-link">
            <figure class="portfolio-list-3__item-image">
              <img src="https://demo.wakit.org/img/samples/photo-1555066931-4365d14bab8c.png" alt="이미지" class="portfolio-list-3__item-image-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
              <div class="portfolio-list-3__item-image-placeholder" style="display: none;"></div>
            </figure>
            <div class="portfolio-list-3__item-info">
              <h3 class="portfolio-list-3__item-title">변화를 만드는 순간</h3>
              <p class="portfolio-list-3__item-category">일러스트</p>
            </div>
          </a>
        </article>

        <!-- Portfolio Item 5 -->
        <article class="portfolio-list-3__item portfolio-list-3__item--square">
          <a href="views/portfolio-detail-1.html" class="portfolio-list-3__item-link">
            <figure class="portfolio-list-3__item-image">
              <img src="https://demo.wakit.org/img/samples/photo-1551288049-bebda4e38f71.png" alt="이미지" class="portfolio-list-3__item-image-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
              <div class="portfolio-list-3__item-image-placeholder" style="display: none;"></div>
            </figure>
            <div class="portfolio-list-3__item-info">
              <h3 class="portfolio-list-3__item-title">성장하는 이야기</h3>
              <p class="portfolio-list-3__item-category">일러스트</p>
            </div>
          </a>
        </article>
      </div>

      <!-- Pagination -->
      <nav class="portfolio-list-3__pagination" aria-label="페이지 네비게이션">
        <button type="button" class="portfolio-list-3__pagination-button" aria-label="이전 페이지">
          <i class="bi bi-chevron-left" aria-hidden="true"></i>
        </button>
        <button type="button" class="portfolio-list-3__pagination-button portfolio-list-3__pagination-button--active" aria-label="페이지 1" aria-current="page">1</button>
        <button type="button" class="portfolio-list-3__pagination-button" aria-label="페이지 2">2</button>
        <button type="button" class="portfolio-list-3__pagination-button" aria-label="페이지 3">3</button>
        <button type="button" class="portfolio-list-3__pagination-button" aria-label="페이지 생략">..</button>
        <button type="button" class="portfolio-list-3__pagination-button" aria-label="페이지 7">7</button>
        <button type="button" class="portfolio-list-3__pagination-button" aria-label="다음 페이지">
          <i class="bi bi-chevron-right" aria-hidden="true"></i>
        </button>
      </nav>
    </div>
  </section>

  </div><!-- /.portfolio-list-3__tabs-and-content -->

  <!-- CTA Banner Section -->
  <section class="portfolio-list-3__cta">
    <div class="container">
      <div class="portfolio-list-3__cta-content">
        <div class="portfolio-list-3__cta-background">
          <img src="https://demo.wakit.org/img/samples/photo-1506905925346-21bda4d32df4.png" alt="이미지" class="portfolio-list-3__cta-background-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <div class="portfolio-list-3__cta-background-placeholder" style="display: none;"></div>
        </div>
        <div class="portfolio-list-3__cta-text">
          <h2 class="portfolio-list-3__cta-title">당신의 꿈을<br>현실로 만드세요!</h2>
          <p class="portfolio-list-3__cta-description">전문가와 함께 당신의 아이디어를 실현해 보세요.<br>맞춤형 솔루션을 제공합니다.</p>
          <a href="#" class="btn btn--primary btn--m portfolio-list-3__cta-button">
            <span>혁신적인 방법</span>
          </a>
        </div>
      </div>
    </div>
  </section>
</main>


<div data-include="wakit-components/footer.html" data-include-when="web"></div>

</body>
<script src="../../../wakit/js/wakit-popup.js" data-spa-ignore></script>
<script src="js/theme-toggle.js" data-spa-ignore></script>
<script src="js/scroll-to-top.js" data-spa-ignore></script>
<script data-spa-ignore>
  Popup.init();
  console.log('home page script executed');
</script>

</html>
