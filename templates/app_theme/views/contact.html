<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>문의하기</title>
  <script src="../../../wakit/js/wakit-bridge.js" data-spa-ignore></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" data-spa-ignore >
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-rounded/css/uicons-solid-rounded.css' data-spa-ignore>
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css' data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/wakit.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/styleGuide.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/component.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/wakit-popup.css">

  <!-- 초기 테마 설정 (FOUC 방지) -->
  <script src="js/theme-init.js" data-spa-ignore></script>
</head>
<body>

<!-- Foundation Design Tokens (base 태그로 인해 css/ 경로 사용) -->
<link rel="stylesheet" href="css/foundation/color.css">
<link rel="stylesheet" href="css/foundation/buttons.css">
<link rel="stylesheet" href="css/foundation/badge.css">
<link rel="stylesheet" href="css/foundation/spacing.css">
<link rel="stylesheet" href="css/foundation/typography.css">
<link rel="stylesheet" href="css/foundation/effect.css">
<link rel="stylesheet" href="css/foundation/layout.css">
<link rel="stylesheet" href="css/foundation/icons.css">
<link rel="stylesheet" href="css/foundation/graphic.css">
<!-- Blog Styles -->
<link rel="stylesheet" href="css/style.css">
<!-- Contact Page Styles -->
<link rel="stylesheet" href="css/contact.css">

<!-- 데스크톱 헤더 -->
<div data-include="../wakit-components/header.html" data-include-when="web"></div>

<main class="contact-page">
  <!-- Page Header Section -->
  <section class="contact-header-section">
    <div class="contact-header-container">
      <!-- Breadcrumb -->
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <ol class="breadcrumb-list">
          <li class="breadcrumb-item">
            <a href="index.html" class="breadcrumb-link">
              <i class="bi bi-house" aria-hidden="true"></i>
              <span>홈</span>
            </a>
          </li>
          <li class="breadcrumb-item">
            <i class="bi bi-chevron-right" aria-hidden="true"></i>
            <span class="breadcrumb-current">문의하기</span>
          </li>
        </ol>
      </nav>

      <!-- Header Content -->
      <div class="contact-header-content">
        <h1 class="contact-main-title">문의하기</h1>
        <!-- <h2>창의적인 해결책</h2> -->
      </div>

      <!-- CTA Buttons -->
      <!-- <div class="contact-header-buttons">
        <button type="button" class="contact-cta-button contact-cta-button--primary">
          <span>CTA 버튼</span>
          <i class="bi bi-chevron-right" aria-hidden="true"></i>
        </button>
        <button type="button" class="contact-cta-button contact-cta-button--secondary">
          <span>CTA 버튼</span>
          <i class="bi bi-chevron-right" aria-hidden="true"></i>
        </button>
      </div> -->
    </div>
  </section>

  <!-- Contact Section -->
  <section class="contact-section">
    <div class="contact-container">
      <!-- Image -->
      <div class="contact-image-wrapper">
        <div class="contact-image">
          <img src="https://demo.wakit.org/img/samples/photo-1556740772-1a741367b93e.png" alt="이미지" />
        </div>
      </div>

      <!-- Form Container -->
      <div class="contact-form-container">
        <h2 class="contact-form-title">전문적인 파트너십</h2>
        
        <form class="contact-form" action="#" method="post">
          <!-- Name Input -->
          <div class="input-field">
            <label for="contact-name" class="input-label">이름</label>
            <div class="input-wrapper">
              <i class="bi bi-person input-icon" aria-hidden="true"></i>
              <input type="text" id="contact-name" name="name" placeholder="이름을 입력해주세요." required>
            </div>
            <!-- <span class="input-helper">안정적인 운영</span> -->
          </div>

          <!-- Email Input -->
          <div class="input-field">
            <label for="contact-email" class="input-label">이메일</label>
            <div class="input-wrapper">
              <i class="bi bi-envelope input-icon" aria-hidden="true"></i>
              <input type="email" id="contact-email" name="email" placeholder="이메일을 입력해주세요." required>
            </div>
            <!-- <span class="input-helper">혁신적인 도구</span> -->
          </div>

          <!-- Phone Input -->
          <div class="input-field">
            <label for="contact-phone" class="input-label">연락처</label>
            <div class="input-wrapper">
              <i class="bi bi-telephone input-icon" aria-hidden="true"></i>
              <input type="tel" id="contact-phone" name="phone" placeholder="연락처를 입력해주세요." required>
            </div>
            <!-- <span class="input-helper">효율적인 관리</span> -->
          </div>

          <!-- Message Textarea -->
          <div class="input-field">
            <label for="contact-message" class="input-label">문의 내용</label>
            <div class="textarea-wrapper">
              <textarea id="contact-message" name="message" placeholder="문의 내용을 입력해주세요." rows="4" maxlength="1000" required></textarea>
              <div class="textarea-count">
                <span class="textarea-count-current">0</span>
                <span class="textarea-count-max">체계적인 접근</span>
              </div>
            </div>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn btn--primary btn--l contact-submit-button">
            <span>보내기</span>
            <i class="bi bi-chevron-right" aria-hidden="true"></i>
          </button>
        </form>
      </div>
    </div>
  </section>

  <!-- Contact Info Cards -->
  <section class="contact-info-section">
    <div class="contact-info-container">
      <div class="contact-info-grid">
        <!-- Address Card -->
        <div class="contact-info-card">
          <i class="bi bi-geo-alt contact-info-icon" aria-hidden="true"></i>
          <h3 class="contact-info-title">신뢰할 수 있는 동반자</h3>
          <p class="contact-info-text">끊임없는 연구와 개발로 더 나은 결과를 만들어갑니다.</p>
          <!-- <a href="#" class="contact-info-link">이건 링크</a> -->
        </div>

        <!-- Email Card -->
        <div class="contact-info-card">
          <i class="bi bi-envelope contact-info-icon" aria-hidden="true"></i>
          <h3 class="contact-info-title">이메일</h3>
          <p class="contact-info-text">24시간 이내에 답변을 드리겠습니다</p>
          <a href="mailto:admin@wakit.org" class="contact-info-link">admin@wakit.org</a>
        </div>

        <!-- Phone Card -->
        <div class="contact-info-card">
          <i class="bi bi-telephone contact-info-icon" aria-hidden="true"></i>
          <h3 class="contact-info-title">미래를 향한 도전</h3>
          <p class="contact-info-text">언제든지 편하게 연락주세요</p>
          <a href="tel:+82100000000" class="contact-info-link">+82 10-000-0000</a>
        </div>
      </div>
    </div>
  </section>

  <!-- Map Section -->
  <section class="contact-map-section">
    <div class="contact-map-container">
      <h2 class="contact-map-title">오시는 길</h2>
      <div class="contact-map-wrapper">
        <div class="contact-map">
          <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3165.301884789123!2d127.02761031531098!3d37.49794227980845!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357ca15aee9ab9cb%3A0x8e21e01f3b81e3a2!2z6rK96riw64-EIOyYgeyYgeuMgOq1rCDsl63sgrzrj5k!5e0!3m2!1sko!2skr!4v1234567890123!5m2!1sko!2skr" 
            width="100%" 
            height="100%" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade"
            title="오시는 길 지도">
          </iframe>
        </div>
      </div>
    </div>
  </section>
</main>

<!-- Footer -->
<div data-include="../wakit-components/footer.html" data-include-when="web"></div>

</body>
<script src="../../../wakit/js/wakit-popup.js" data-spa-ignore></script>
<script src="js/theme-toggle.js" data-spa-ignore></script>
<script src="js/header.js" data-spa-ignore></script>
<script src="js/scroll-to-top.js" data-spa-ignore></script>
<script src="js/contact.js"></script>
<script data-spa-ignore>
  Popup.init();
</script>
</html>
