<script>
  Popup.init();
  console.log('home page script executed');

  // Masonry Layout + 더 불러오기
  (function() {
    const grid = document.querySelector('.portfolio-list-2__grid');
    const loadMoreBtn = document.querySelector('.portfolio-list-2__load-more-button');
    if (!grid) return;

    // 추가 로드용 아이템 데이터 (tall: 384x486, square: 384x384)
    const MORE_ITEMS = [
      { type: 'tall', src: 'img/samples/photo-1547658719-da2b51169166.png' },
      { type: 'square', src: 'img/samples/photo-1517694712202-14dd9538aa97.png' },
      { type: 'tall', src: 'img/samples/photo-1517180102446-f3ece451e9d8.png' },
      { type: 'square', src: 'img/samples/photo-1504384308090-c894fdcc538d.png' },
      { type: 'tall', src: 'img/samples/photo-1522071820081-009f0129c71c.png' },
      { type: 'square', src: 'img/samples/photo-1523240795612-9a054b0db644.png' }
    ];
    let moreItemsIndex = 0;

    function createItemElement(data) {
      const article = document.createElement('article');
      article.className = 'portfolio-list-2__item portfolio-list-2__item--' + data.type;
      article.innerHTML =
        '<a href="views/portfolio-detail-1.html" class="portfolio-list-2__item-link">' +
          '<figure class="portfolio-list-2__item-image">' +
            '<img src="' + data.src + '" alt="이미지" class="portfolio-list-2__item-image-img" onerror="this.style.display=\'none\'; this.nextElementSibling.style.display=\'block\';">' +
            '<div class="portfolio-list-2__item-image-placeholder" style="display: none;"></div>' +
          '</figure>' +
        '</a>';
      return article;
    }

    function addMoreItems() {
      let count = 3;
      for (let i = 0; i < count; i++) {
        const data = MORE_ITEMS[moreItemsIndex % MORE_ITEMS.length];
        moreItemsIndex++;
        grid.appendChild(createItemElement(data));
      }
      // 새 이미지 로드 후 masonry 재계산
      setTimeout(function() { waitForImages(); }, 0);
    }

    if (loadMoreBtn) {
      loadMoreBtn.addEventListener('click', function() {
        addMoreItems();
      });
    }

    function getColumnCount() {
      if (window.innerWidth <= 768) return 2;
      if (window.innerWidth <= 1024) return 2;
      return 3;
    }

    function getGap() {
      return window.innerWidth <= 768 ? 16 : 24; // spacing-md or spacing-lg
    }

    function initMasonry() {
      const items = Array.from(grid.querySelectorAll('.portfolio-list-2__item'));
      if (items.length === 0) return;

      const columnCount = getColumnCount();
      const gap = getGap();
      
      grid.setAttribute('data-columns', columnCount);
      grid.style.height = 'auto';

      // 각 컬럼의 높이를 추적
      const columnHeights = new Array(columnCount).fill(0);
      const itemWidth = `calc((100% - ${gap * (columnCount - 1)}px) / ${columnCount})`;

      // 그리드 너비 계산
      const gridWidth = grid.offsetWidth;
      const computedItemWidth = (gridWidth - (gap * (columnCount - 1))) / columnCount;

      items.forEach((item, index) => {
        // 가장 낮은 컬럼 찾기
        const shortestColumnIndex = columnHeights.indexOf(Math.min(...columnHeights));
        
        // 아이템 위치 설정
        const left = shortestColumnIndex * (100 / columnCount);
        const leftOffset = shortestColumnIndex * gap;
        const top = columnHeights[shortestColumnIndex];
        
        item.style.left = `calc(${left}% + ${leftOffset}px)`;
        item.style.top = top + 'px';
        item.style.width = itemWidth;
        
        // 컬럼 높이 업데이트
        // 먼저 실제 높이를 측정 시도
        let itemHeight = item.offsetHeight;
        
        // 높이가 0이거나 측정되지 않은 경우 aspect-ratio로 계산
        if (itemHeight === 0 || !itemHeight) {
          const image = item.querySelector('.portfolio-list-2__item-image-img');
          
          if (image && image.complete && image.naturalHeight > 0 && image.naturalWidth > 0) {
            // 이미지가 로드된 경우 실제 비율 사용
            const aspectRatio = image.naturalWidth / image.naturalHeight;
            itemHeight = computedItemWidth / aspectRatio;
          } else if (item.classList.contains('portfolio-list-2__item--tall')) {
            // tall 아이템: 384/486 비율
            itemHeight = computedItemWidth * (486 / 384);
          } else {
            // square 아이템: 1:1 비율
            itemHeight = computedItemWidth;
          }
        }
        
        columnHeights[shortestColumnIndex] += itemHeight + gap;
      });

      // 그리드 높이 설정
      const maxHeight = Math.max(...columnHeights);
      grid.style.height = maxHeight + 'px';
    }

    // 이미지 로드 후 재계산
    function waitForImages() {
      const images = grid.querySelectorAll('.portfolio-list-2__item-image-img');
      let loadedCount = 0;
      const totalImages = images.length;

      if (totalImages === 0) {
        setTimeout(initMasonry, 100);
        return;
      }

      images.forEach(img => {
        if (img.complete) {
          loadedCount++;
        } else {
          img.addEventListener('load', function() {
            loadedCount++;
            if (loadedCount === totalImages) {
              setTimeout(initMasonry, 100);
            }
          }, { once: true });
        }
      });

      if (loadedCount === totalImages) {
        setTimeout(initMasonry, 100);
      }
    }

    // 초기 실행
    waitForImages();

    // 리사이즈 이벤트 핸들러 (디바운스)
    let resizeTimer;
    window.addEventListener('resize', function() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function() {
        waitForImages();
      }, 250);
    });
  })();
</script>
