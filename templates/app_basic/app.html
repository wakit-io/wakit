<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>WAKIT Template</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="msapplication-tap-highlight" content="no">
  <meta name="hybrid:disable-onboarding" content="1">
  <meta name="hybrid:disable-intro" content="1">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#ffffff">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" >
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
  <link rel="stylesheet" href="/wakit/css/wakit.css">
  <link rel="stylesheet" href="/wakit/css/styleGuide.css">
  <link rel="stylesheet" href="/wakit/css/component.css">
  <link rel="stylesheet" href="/wakit/css/wakit-popup.css">
  <link rel="stylesheet" href="./css/style.css">
  <!-- 다크/라이트 초기값 (FOUC 방지, 웹 템플릿과 동일 키 blog-theme) -->
  <script src="./js/theme-init.js"></script>
  <!-- Auto popup for SPA: meta must be in the shell head (not in injected pages) -->
  <!-- <meta name="popup:auto-url" content="wakit-popups/popuptest.html"> -->
</head>
<body id="root">
  <script type="module">
    import Core from "/wakit/js/wakit.js";
    Core.initApp('./wakitConfig.json');
    // In dev, skip SW to avoid caching preventing live updates
    const isLocalDev = ['localhost', '127.0.0.1'].includes(location.hostname);
    if ('serviceWorker' in navigator && !isLocalDev) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/wakit/service-worker.js');
      });
    }
  </script>
  <!-- Load dev client bundle to enable live reload when running webpack-dev-server -->
  <script src="/wakit/js/wakit-popup.js"></script>
  <script>window.Popup && Popup.init();</script>
</body>
</html>
