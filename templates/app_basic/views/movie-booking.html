<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>App Basic</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="msapplication-tap-highlight" content="no">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#ffffff">
  <script src="../../../wakit/js/wakit-bridge.js" data-spa-ignore></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/wakit.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/styleGuide.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/component.css" data-spa-ignore>
  <link rel="stylesheet" href="css/foundation/index.css" data-spa-ignore>
  <link rel="stylesheet" href="css/style.css" data-spa-ignore>
  <script src="js/theme-init.js" data-spa-ignore></script>
</head>
<body>

<div data-include="wakit-components/header.html" data-spa-ignore></div>


<!-- 영화예매-예매 | Foundation 토큰 사용 -->
<link rel="stylesheet" href="css/movie-booking.css">

<main class="movie-page movie-booking container" role="main">
  <section class="movie-booking__hero">
    <p class="movie-booking__hero-text">당신의 마음을 채우는<br>두 시간의 이야기</p>
  </section>

  <div class="movie-booking__chips">
    <span class="movie-booking__chip">귀멸의칼날</span>
    <span class="movie-booking__chip">트랜스포머:..</span>
    <span class="movie-booking__chip">귀공자</span>
    <span class="movie-booking__chip">분당</span>
    <span class="movie-booking__chip">강남</span>
    <span class="movie-booking__chip">강남대로(씨...)</span>
  </div>

  <section class="movie-booking__cards">
    <a href="#" class="movie-booking-card">
      <div class="movie-booking-card__icon"><i class="bi bi-building"></i></div>
      <h3 class="movie-booking-card__title">어느곳에서<br>보고 싶으세요?</h3>
      <p class="movie-booking-card__desc">극장별 예매</p>
    </a>
    <a href="#" class="movie-booking-card">
      <div class="movie-booking-card__icon"><i class="bi bi-film"></i></div>
      <h3 class="movie-booking-card__title">어떤 영화를<br>보고 싶으세요?</h3>
      <p class="movie-booking-card__desc">영화별 예매</p>
    </a>
  </section>

  <article class="movie-booking__promo">
    <div class="movie-booking__promo-img"><img src="https://via.placeholder.com/84x84/1a1a2e/eee" alt=""></div>
    <div class="movie-booking__promo-body">
      <h3 class="movie-booking__promo-title">특별한 날, 프라이빗관 어떠세요?</h3>
      <p class="movie-booking__promo-desc">코엑스 프라이빗 대관예매</p>
    </div>
  </article>
</main>


<div data-include="wakit-components/footer.html" data-spa-ignore></div>

</body>
<script src="../../../wakit/js/wakit-popup.js" data-spa-ignore></script>
<script src="js/theme-toggle.js" data-spa-ignore></script>
<script src="js/header.js" data-spa-ignore></script>
<script src="js/scroll-to-top.js" data-spa-ignore></script>
<script data-spa-ignore>if (typeof Popup !== 'undefined') Popup.init();</script>
</html>
