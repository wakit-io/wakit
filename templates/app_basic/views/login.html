<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>로그인 · App Basic</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="msapplication-tap-highlight" content="no">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#ffffff">
  <script src="../../../wakit/js/wakit-bridge.js" data-spa-ignore></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/wakit.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/styleGuide.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/component.css" data-spa-ignore>
  <link rel="stylesheet" href="css/foundation/index.css" data-spa-ignore>
  <link rel="stylesheet" href="css/style.css" data-spa-ignore>
  
  <script src="js/theme-init.js" data-spa-ignore></script>
</head>
<body>

<link rel="stylesheet" href="css/login.css">

<div data-include="wakit-components/header.html"></div>

<main class="login-page" role="main">
  <div class="login-card">

    <h1 class="login-title">로그인</h1>
    <p class="login-subtitle">계정에 로그인하고 예매를 이어가세요.</p>

    <form class="login-form" onsubmit="return false;">
      <label class="login-field">
        <span class="login-field__label">이메일</span>
        <input type="email" class="login-field__input" placeholder="you@example.com" autocomplete="email" required>
      </label>
      <label class="login-field">
        <span class="login-field__label">비밀번호</span>
        <input type="password" class="login-field__input" placeholder="••••••••" autocomplete="current-password" required>
      </label>

      <div class="login-options">
        <label class="login-remember">
          <input type="checkbox"> <span>로그인 유지</span>
        </label>
        <a href="#" class="login-forgot">비밀번호 찾기</a>
      </div>

      <button type="submit" class="login-submit">로그인</button>
    </form>

    <div class="login-divider"><span>또는</span></div>

    <div class="login-social">
      <a href="#" class="login-social__btn login-social__btn--naver">
        <span class="login-social__mark">N</span> 네이버로 계속하기
      </a>
      <a href="#" class="login-social__btn login-social__btn--kakao">
        <i class="bi bi-chat-fill"></i> 카카오로 계속하기
      </a>
      <a href="#" class="login-social__btn login-social__btn--google">
        <i class="bi bi-google"></i> Google로 계속하기
      </a>
    </div>

    <p class="login-signup">계정이 없으신가요? <a href="views/signup.html">회원가입</a></p>

  </div>
</main>

<div data-include="wakit-components/footer.html"></div>

</body>
<script src="../../../wakit/js/wakit-popup.js" data-spa-ignore></script>
<script src="js/theme-toggle.js" data-spa-ignore></script>
<script src="js/header.js" data-spa-ignore></script>
<script src="js/scroll-to-top.js" data-spa-ignore></script>
<script data-spa-ignore>if (typeof Popup !== 'undefined') Popup.init();</script>
</html>
