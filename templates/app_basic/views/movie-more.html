<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>My · App Basic</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="msapplication-tap-highlight" content="no">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#ffffff">
  <script src="../../../wakit/js/wakit-bridge.js" data-spa-ignore></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/wakit.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/styleGuide.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/component.css" data-spa-ignore>
  <link rel="stylesheet" href="css/foundation/index.css" data-spa-ignore>
  <link rel="stylesheet" href="css/style.css" data-spa-ignore>
  <script src="js/theme-init.js" data-spa-ignore></script>
</head>
<body>

<div data-include="wakit-components/header.html" data-spa-ignore></div>

<!-- 영화예매-더보기(My) | Foundation 토큰 사용 -->
<!-- Screen-specific CSS: inside body, no data-spa-ignore (applies in web + SPA) -->
<link rel="stylesheet" href="css/movie-more.css">

<main class="movie-page movie-more container" role="main">
  <div class="movie-more__notice">
    <i class="bi bi-megaphone"></i>
    <span>[공지] POINT 시스템 정기 점검 안내</span>
  </div>

  <div class="movie-more__points">
    <div class="movie-more__point">
      <span class="movie-more__point-label">포인트</span>
      <strong class="movie-more__point-value">6,700 P</strong>
    </div>
    <div class="movie-more__point">
      <span class="movie-more__point-label">쿠폰</span>
      <strong class="movie-more__point-value">1장</strong>
    </div>
    <div class="movie-more__point">
      <span class="movie-more__point-label">로그인</span>
      <strong class="movie-more__point-value">1장</strong>
    </div>
  </div>

  <section class="movie-more__quick">
    <h2 class="movie-more__quick-title">텍스트</h2>
    <div class="movie-more__quick-grid">
      <a href="#" class="movie-more__quick-item">
        <span class="movie-more__quick-icon"><i class="bi bi-film"></i></span>
        <span class="movie-more__quick-label">영화별 예매</span>
      </a>
      <a href="#" class="movie-more__quick-item">
        <span class="movie-more__quick-icon"><i class="bi bi-building"></i></span>
        <span class="movie-more__quick-label">극장별 예매</span>
      </a>
      <a href="#" class="movie-more__quick-item">
        <span class="movie-more__quick-icon"><i class="bi bi-star"></i></span>
        <span class="movie-more__quick-label">특별관 예매</span>
      </a>
      <a href="#" class="movie-more__quick-item">
        <span class="movie-more__quick-icon"><i class="bi bi-gem"></i></span>
        <span class="movie-more__quick-label">더 부티크</span>
      </a>
      <a href="#" class="movie-more__quick-item">
        <span class="movie-more__quick-icon"><i class="bi bi-gift"></i></span>
        <span class="movie-more__quick-label">이벤트</span>
      </a>
      <a href="#" class="movie-more__quick-item">
        <span class="movie-more__quick-icon"><i class="bi bi-percent"></i></span>
        <span class="movie-more__quick-label">제휴/할인</span>
      </a>
    </div>
  </section>

  <section class="movie-more__settings">
    <h2 class="movie-more__settings-title">화면 테마</h2>
    <div class="theme-options" role="radiogroup" aria-label="화면 테마">
      <button type="button" class="theme-options__item" data-theme-option="system" role="radio" aria-checked="false">
        <i class="bi bi-circle-half"></i>
        <span>시스템</span>
      </button>
      <button type="button" class="theme-options__item" data-theme-option="light" role="radio" aria-checked="false">
        <i class="bi bi-sun"></i>
        <span>라이트</span>
      </button>
      <button type="button" class="theme-options__item" data-theme-option="dark" role="radio" aria-checked="false">
        <i class="bi bi-moon-stars"></i>
        <span>다크</span>
      </button>
    </div>
  </section>

  <div class="movie-more__links">
    <a href="#" class="movie-more__link">알림함</a>
    <a href="#" class="movie-more__link">고객센터</a>
  </div>

  <div class="movie-more__social">
    <a href="#" class="movie-more__social-item" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
    <a href="#" class="movie-more__social-item" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
    <a href="#" class="movie-more__social-item" aria-label="YouTube"><i class="bi bi-youtube"></i></a>
  </div>
</main>

<div data-include="wakit-components/footer.html" data-spa-ignore></div>

</body>
<script src="../../../wakit/js/wakit-popup.js" data-spa-ignore></script>
<script src="js/theme-toggle.js" data-spa-ignore></script>
<script src="js/header.js" data-spa-ignore></script>
<script src="js/scroll-to-top.js" data-spa-ignore></script>
<script data-spa-ignore>if (typeof Popup !== 'undefined') Popup.init();</script>
</html>
