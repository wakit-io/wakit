<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>스토어 · App Basic</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="msapplication-tap-highlight" content="no">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#ffffff">
  <script src="../../../wakit/js/wakit-bridge.js" data-spa-ignore></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/wakit.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/styleGuide.css" data-spa-ignore>
  <link rel="stylesheet" href="../../../wakit/css/component.css" data-spa-ignore>
  <link rel="stylesheet" href="css/foundation/index.css" data-spa-ignore>
  <link rel="stylesheet" href="css/style.css" data-spa-ignore>
  <script src="js/theme-init.js" data-spa-ignore></script>
</head>
<body>

<div data-include="wakit-components/header.html" data-spa-ignore></div>

<!-- 영화예매-스토어 | Foundation 토큰 사용 -->
<!-- Screen-specific CSS: inside body, no data-spa-ignore (applies in web + SPA) -->
<link rel="stylesheet" href="css/movie-store.css">

<main class="movie-page movie-store container" role="main">
  <nav class="movie-tabs" role="tablist">
    <button type="button" class="movie-tabs__item is-active" role="tab">기프트카드</button>
    <button type="button" class="movie-tabs__item" role="tab">E-티켓</button>
    <button type="button" class="movie-tabs__item" role="tab">팝콘/음료/굿즈</button>
    <button type="button" class="movie-tabs__item" role="tab">포인트몰</button>
  </nav>

  <section class="movie-section movie-products">
    <article class="movie-product">
      <div class="movie-product__thumb">20,000</div>
      <div class="movie-product__info">
        <span class="movie-product__badge">BEST</span>
        <h3 class="movie-product__title">디베 기프트카드</h3>
        <p class="movie-product__desc">디베 기프트카드 2만원</p>
        <div class="movie-product__price">
          <span class="movie-product__discount">10%</span>
          <span class="movie-product__amount">18,000원</span>
          <span class="movie-product__origin">20,000원</span>
        </div>
      </div>
    </article>
    <article class="movie-product">
      <div class="movie-product__thumb">30,000</div>
      <div class="movie-product__info">
        <span class="movie-product__badge">BEST</span>
        <h3 class="movie-product__title">디베 기프트카드</h3>
        <p class="movie-product__desc">디베 기프트카드 3만원</p>
        <div class="movie-product__price">
          <span class="movie-product__discount">10%</span>
          <span class="movie-product__amount">30,000원</span>
          <span class="movie-product__origin">20,000원</span>
        </div>
      </div>
    </article>
    <article class="movie-product">
      <div class="movie-product__thumb">50,000</div>
      <div class="movie-product__info">
        <span class="movie-product__badge movie-product__badge--sale">SALE</span>
        <h3 class="movie-product__title">디베 기프트카드</h3>
        <p class="movie-product__desc">디베 기프트카드 5만원</p>
        <div class="movie-product__price">
          <span class="movie-product__discount">10%</span>
          <span class="movie-product__amount">45,000원</span>
          <span class="movie-product__origin">50,000원</span>
        </div>
      </div>
    </article>
  </section>
</main>

<div data-include="wakit-components/footer.html" data-spa-ignore></div>

</body>
<script src="../../../wakit/js/wakit-popup.js" data-spa-ignore></script>
<script src="js/theme-toggle.js" data-spa-ignore></script>
<script src="js/header.js" data-spa-ignore></script>
<script src="js/scroll-to-top.js" data-spa-ignore></script>
<script data-spa-ignore>if (typeof Popup !== 'undefined') Popup.init();</script>
</html>
